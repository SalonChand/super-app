<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Primary Meta ── -->
    <title>Connect - Social Network</title>
    <meta name="description" content="Connect is Nepal's social network — share posts, chat with friends, watch reels, discover communities and grow your network." />
    <meta name="keywords" content="Connect, social network, Nepal, friends, chat, reels, community" />
    <meta name="author" content="Connect" />

    <!-- ── Viewport ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── Theme ── -->
    <meta name="theme-color" content="#09090b" />

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />

    <!-- ── Apple / iOS ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Connect" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/logo.png" />

    <!-- ── Open Graph (Facebook, WhatsApp, etc.) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Connect" />
    <meta property="og:title" content="Connect - Social Network" />
    <meta property="og:description" content="Nepal's social network — share posts, chat with friends, watch reels and grow your network." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://super-app-wc32.vercel.app" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Connect - Social Network" />
    <meta name="twitter:description" content="Nepal's social network — share posts, chat with friends and grow your network." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- ── Safe Area Insets (notch/island support) ── -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        background: #09090b;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
      }
      /* Prevent iOS bounce scroll */
      html { overflow: hidden; height: 100%; }
      body { height: 100%; overflow: auto; -webkit-overflow-scrolling: touch; }
      /* pb-safe utility for bottom nav above home indicator */
      .pb-safe { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
      /* pt-safe utility for top headers below status bar */
      .pt-safe { padding-top: max(16px, env(safe-area-inset-top)); }
      /* Full safe area for standalone PWA */
      .safe-top { padding-top: env(safe-area-inset-top); }
    </style>

    <!-- ── Microsoft ── -->
    <meta name="msapplication-TileColor" content="#09090b" />
    <meta name="msapplication-TileImage" content="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
